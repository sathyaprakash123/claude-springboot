<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring Boot Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 50%, #f5576c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #fff;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(102,126,234,0.25);
      border-top: 4px solid;
    }

    .card:nth-child(2) { border-color: #667eea; }
    .card:nth-child(3) { border-color: #f5576c; }
    .card:nth-child(4) { border-color: #43e97b; }
    .card:nth-child(5) { border-color: #f7971e; }

    .card h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, #667eea, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.9rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
    }

    input[type="text"],
    input[type="number"] {
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #c9b8f5;
      border-radius: 7px;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background: #faf8ff;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
    }

    button {
      width: 100%;
      padding: 0.65rem;
      background: linear-gradient(90deg, #667eea, #f5576c);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.25rem;
    }

    button:hover  { opacity: 0.88; }
    button:active { transform: scale(0.98); }

    .response {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 7px;
      font-size: 0.9rem;
      display: none;
    }

    .response.success {
      display: block;
      background: #e6fff5;
      color: #1a7a4a;
      border: 1px solid #6ee7b7;
    }

    .response.error {
      display: block;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #fca5a5;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
    }

    .word-chip {
      background: #f0f4ff;
      color: #3a4ea8;
      border: 1px solid #c3cef7;
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .word-count {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Spring Boot Demo</h1>

    <!-- GET /hello -->
    <div class="card">
      <h2>GET &nbsp;/hello</h2>
      <button id="helloBtn" onclick="callHello()">Send Request</button>
      <div id="helloResponse" class="response"></div>
    </div>

    <!-- POST /person -->
    <div class="card">
      <h2>POST &nbsp;/person</h2>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="e.g. Alice">
      </div>
      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="e.g. 30" min="0">
      </div>
      <div class="field">
        <label for="gender">Gender</label>
        <input type="text" id="gender" placeholder="e.g. Female">
      </div>
      <button onclick="callPerson()">Send Request</button>
      <div id="personResponse" class="response"></div>
    </div>

    <!-- GET /date -->
    <div class="card">
      <h2>GET &nbsp;/date</h2>
      <div class="field">
        <label for="dateInput">Date (yyyy-MM-dd)</label>
        <input type="date" id="dateInput">
      </div>
      <button onclick="callDate()">Send Request</button>
      <div id="dateResponse" class="response"></div>
    </div>

    <!-- POST /words -->
    <div class="card">
      <h2>POST &nbsp;/words</h2>
      <div class="field">
        <label for="wordName">Your Name</label>
        <input type="text" id="wordName" placeholder="e.g. Alice">
      </div>
      <button onclick="callWords()">Find Words</button>
      <div id="wordsError" class="response"></div>
      <div id="wordResults" style="display:none">
        <p class="word-count" id="wordCount"></p>
        <div class="word-list" id="wordList"></div>
      </div>
    </div>
  </div>

  <script>
    function showResponse(id, text, ok) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "response " + (ok ? "success" : "error");
    }

    async function callHello() {
      try {
        const res = await fetch("/hello");
        const text = await res.text();
        showResponse("helloResponse", text, res.ok);
      } catch (e) {
        showResponse("helloResponse", "Error: " + e.message, false);
      }
    }

    async function callDate() {
      const dateVal = document.getElementById("dateInput").value;
      if (!dateVal) {
        showResponse("dateResponse", "Please select a date.", false);
        return;
      }
      try {
        const res = await fetch("/date?date=" + encodeURIComponent(dateVal));
        const text = await res.text();
        showResponse("dateResponse", text, res.ok);
      } catch (e) {
        showResponse("dateResponse", "Error: " + e.message, false);
      }
    }

    async function callPerson() {
      const name   = document.getElementById("name").value.trim();
      const ageVal = document.getElementById("age").value.trim();
      const gender = document.getElementById("gender").value.trim();

      if (!name || !ageVal || !gender) {
        showResponse("personResponse", "Please fill in all fields.", false);
        return;
      }

      try {
        const res = await fetch("/person", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, age: parseInt(ageVal, 10), gender })
        });
        const text = await res.text();
        showResponse("personResponse", text, res.ok);
      } catch (e) {
        showResponse("personResponse", "Error: " + e.message, false);
      }
    }

    async function callWords() {
      const name = document.getElementById("wordName").value.trim();
      const errorEl = document.getElementById("wordsError");
      const resultsEl = document.getElementById("wordResults");
      const listEl = document.getElementById("wordList");
      const countEl = document.getElementById("wordCount");

      errorEl.className = "response";
      resultsEl.style.display = "none";
      listEl.innerHTML = "";

      if (!name) {
        showResponse("wordsError", "Please enter a name.", false);
        return;
      }
      try {
        const res = await fetch("/words", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });
        if (!res.ok) {
          const text = await res.text();
          showResponse("wordsError", text, false);
          return;
        }
        const words = await res.json();
        if (words.length === 0) {
          showResponse("wordsError", "No words found for the letters in \"" + name + "\".", false);
          return;
        }
        countEl.textContent = words.length + " word" + (words.length === 1 ? "" : "s") + " found from the letters in \"" + name + "\"";
        words.forEach(w => {
          const chip = document.createElement("span");
          chip.className = "word-chip";
          chip.textContent = w;
          listEl.appendChild(chip);
        });
        resultsEl.style.display = "block";
      } catch (e) {
        showResponse("wordsError", "Error: " + e.message, false);
      }
    }
  </script>
</body>
</html>
